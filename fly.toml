# Fly.io config — https://fly.io/docs/reference/configuration
# Deploy: `fly launch --no-deploy` (once, to create the app), then `fly deploy`.
app = "world-cup-oracle"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  WC_SIMS = "10000"
  WC_RESULTS_TTL = "43200"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/api/status"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
